# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------
name: Gaurang Bansal
email: gaurang@u.nus.edu
description: > # this means to ignore newlines until "url:"
  Profile page of Gaurang Bansal.
footer_text: >

url:  # the base hostname & protocol for your site
baseurl: https://gaurang-bansal.github.io # the subpath of your site, e.g. /blog/
last_updated: # leave blank if you don't want to display last updated

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------
github_username: gaurang18
twitter_username: # your Twitter handle
linkedin_username: # your LinkedIn user name
scholar_userid: 0-6DcmQAAAAJ
orcid_id: # your ORCID ID
contact_note: >
  Please feel free to send me an email in case you are interested in my research.

google_analytics: UA-155329613-1 # out your google-analytics code

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------
# blog_name: al-folio
# blog_description: a simple whitespace theme for academics

# # Pagination
# paginate: 4
# permalink: /blog/:year/:title/
# paginate_path: /blog/page:num/

# text:
